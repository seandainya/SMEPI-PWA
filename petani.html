<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMEPI - Petani</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="app.js"></script>
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(err => console.log('SW Error', err)); }); }
    </script>
</head>

<body class="bg-gray-900">
    <script>
        const currentUser = checkAuth();
        if (currentUser && currentUser.role === 'mandor') window.location.href = 'mandor.html';
    </script>

    <div class="max-w-md mx-auto bg-gray-50 h-[100dvh] relative font-sans shadow-2xl flex flex-col overflow-hidden">

        <header
            class="bg-emerald-600 px-5 pt-6 pb-4 flex-none z-20 shadow-md flex items-center justify-between rounded-b-2xl">
            <div class="flex items-center gap-3">
                <div
                    class="w-11 h-11 rounded-full bg-white/20 border border-white/30 text-white flex items-center justify-center text-lg backdrop-blur-sm shadow-inner">
                    <i class="fa-solid fa-user-helmet"></i>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-emerald-200 uppercase tracking-wider mb-0.5"
                        id="pwa-nama-farm">Memuat...</p>
                    <h2 id="pwa-nama-pekerja" class="text-lg font-black text-white leading-tight">Pekerja</h2>
                </div>
            </div>
            <button onclick="loadPwaTasks()"
                class="w-9 h-9 rounded-full bg-emerald-500/50 text-white flex items-center justify-center text-sm active:scale-90 transition-transform">
                <i class="fa-solid fa-rotate-right"></i>
            </button>
        </header>

        <div class="flex-1 overflow-y-auto px-5 pt-5 pb-6" id="pwa-content-area">

            <div id="tab-home" class="pwa-tab-content block">
                <h3 class="font-black text-gray-800 text-lg mb-4 flex items-center gap-2"><i
                        class="fa-solid fa-clipboard-list text-emerald-600"></i> Tugas Hari Ini</h3>
                <div id="pwa-task-list" class="space-y-4"></div>
            </div>

            <div id="tab-absen" class="pwa-tab-content hidden">
                <div class="text-center mt-6">
                    <div
                        class="w-24 h-24 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-5 text-5xl shadow-sm border border-blue-100">
                        <i class="fa-solid fa-map-location-dot"></i></div>
                    <h3 class="font-black text-2xl text-gray-800 mb-1">Absen Kehadiran</h3>
                    <p class="text-gray-500 font-medium text-sm mb-8 px-4">Tekan tombol saat tiba di lahan.</p>
                    <button id="btn-absen" onclick="submitAbsen()"
                        class="w-full bg-blue-600 text-white rounded-2xl py-6 shadow-lg active:scale-95 transition-transform flex flex-col items-center justify-center">
                        <i class="fa-solid fa-hand-sparkles text-4xl mb-2"></i><span
                            class="text-xl font-black tracking-widest">SAYA HADIR</span>
                    </button>
                </div>
            </div>

            <div id="tab-saldo" class="pwa-tab-content hidden">
                <h3 class="font-black text-gray-800 text-xl mb-4"><i class="fa-solid fa-wallet text-amber-500 mr-2"></i>
                    Dompet</h3>
                <div
                    class="bg-gradient-to-br from-amber-400 to-orange-500 rounded-2xl p-6 shadow-md text-white relative overflow-hidden">
                    <i class="fa-solid fa-coins absolute -right-4 -bottom-4 text-7xl opacity-20"></i>
                    <p class="text-orange-100 font-bold text-xs uppercase tracking-widest mb-1">Total Upah (Belum
                        Dibayar)</p>
                    <h1 id="pwa-saldo-angka" class="text-4xl font-black tracking-tight relative z-10">Rp 0</h1>
                </div>
            </div>

            <div id="tab-profil" class="pwa-tab-content hidden">
                <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 text-center mt-2 relative">
                    <button onclick="bukaModalEditProfil()"
                        class="absolute top-4 right-4 text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-lg text-xs font-bold"><i
                            class="fa-solid fa-pen"></i> Edit</button>
                    <div
                        class="w-24 h-24 bg-gray-50 text-gray-400 rounded-full flex items-center justify-center mx-auto mb-4 text-5xl">
                        <i class="fa-solid fa-user"></i></div>
                    <h3 id="profil-nama" class="font-black text-2xl text-gray-800 mb-1">Nama</h3>
                    <p id="profil-hp" class="text-sm text-gray-500 font-bold mb-8">08xxx</p>
                    <button onclick="logoutApp()"
                        class="w-full bg-red-50 text-red-600 border border-red-100 py-4 rounded-xl font-black text-sm active:scale-95"><i
                            class="fa-solid fa-power-off"></i> KELUAR APLIKASI</button>
                </div>
            </div>

        </div>

        <nav
            class="bg-white border-t border-gray-100 flex justify-around items-center flex-none pb-5 pt-3 px-1 shadow-[0_-4px_20px_rgba(0,0,0,0.04)] z-50 rounded-t-2xl">
            <button onclick="switchTab('tab-home', this)"
                class="pwa-nav-btn text-emerald-600 flex flex-col items-center w-16 active:scale-90">
                <div class="pwa-nav-icon bg-emerald-50 w-10 h-8 flex items-center justify-center rounded-xl"><i
                        class="fa-solid fa-clipboard-list text-lg"></i></div><span
                    class="text-[9px] font-bold mt-1">Tugas</span>
            </button>
            <button onclick="switchTab('tab-absen', this)"
                class="pwa-nav-btn text-gray-400 flex flex-col items-center w-16 active:scale-90">
                <div class="pwa-nav-icon w-10 h-8 flex items-center justify-center rounded-xl"><i
                        class="fa-solid fa-location-dot text-lg"></i></div><span
                    class="text-[9px] font-bold mt-1">Absen</span>
            </button>
            <button onclick="switchTab('tab-saldo', this)"
                class="pwa-nav-btn text-gray-400 flex flex-col items-center w-16 active:scale-90">
                <div class="pwa-nav-icon w-10 h-8 flex items-center justify-center rounded-xl"><i
                        class="fa-solid fa-wallet text-lg"></i></div><span
                    class="text-[9px] font-bold mt-1">Saldo</span>
            </button>
            <button onclick="switchTab('tab-profil', this)"
                class="pwa-nav-btn text-gray-400 flex flex-col items-center w-16 active:scale-90">
                <div class="pwa-nav-icon w-10 h-8 flex items-center justify-center rounded-xl"><i
                        class="fa-solid fa-user text-lg"></i></div><span class="text-[9px] font-bold mt-1">Profil</span>
            </button>
        </nav>
    </div>

    <div id="modal-kamera" class="fixed inset-0 bg-gray-900/90 hidden flex-col justify-end z-[500] backdrop-blur-sm">
        <div class="bg-white w-full max-w-md mx-auto rounded-t-[2rem] p-5 pb-8"><input type="hidden"
                id="kamera-id-task">
            <div
                class="w-full h-56 bg-gray-50 rounded-2xl border-2 border-dashed border-gray-300 flex flex-col items-center justify-center mb-4 relative overflow-hidden">
                <i class="fa-solid fa-image text-4xl text-gray-300 mb-2"></i>
                <p class="text-gray-400 font-bold text-sm" id="teks-preview">Belum ada foto</p><img id="foto-preview"
                    class="absolute inset-0 w-full h-full object-cover hidden">
            </div>
            <div class="grid grid-cols-2 gap-3 mb-4"><label
                    class="bg-blue-50 text-blue-600 border border-blue-100 py-3.5 rounded-xl font-black text-sm text-center shadow-sm cursor-pointer"><i
                        class="fa-solid fa-camera block mb-1 text-lg"></i> AMBIL FOTO<input type="file" id="input-foto"
                        accept="image/*" capture="environment" class="hidden"
                        onchange="previewFoto(event)"></label><button id="btn-kirim-foto"
                    onclick="kirimLaporanSelesai()"
                    class="bg-gray-200 text-gray-400 py-3.5 rounded-xl font-black text-sm cursor-not-allowed"
                    disabled><i class="fa-solid fa-paper-plane block mb-1 text-lg"></i> KIRIM</button></div><button
                onclick="tutupModalKamera()"
                class="w-full py-3.5 bg-gray-100 text-gray-600 font-black rounded-xl text-sm">BATAL</button>
        </div>
    </div>
    <div id="modal-edit-profil"
        class="fixed inset-0 bg-gray-900/80 hidden flex-col justify-end z-[500] backdrop-blur-sm">
        <div class="bg-white w-full max-w-md mx-auto rounded-t-[2rem] p-5 pb-8">
            <h3 class="font-black text-xl mb-4 text-center">Edit Profil</h3>
            <form onsubmit="submitEditProfil(event)" class="space-y-3"><input type="text" id="edit-nama" required
                    class="w-full p-3 bg-gray-50 border rounded-xl font-bold text-sm"><input type="password"
                    id="edit-pin" required maxlength="6" placeholder="••••••"
                    class="w-full p-3 bg-gray-50 border rounded-xl font-black text-center tracking-[0.5em] text-xl">
                <div class="flex gap-2 pt-2"><button type="button" onclick="tutupModalEditProfil()"
                        class="flex-1 py-3.5 bg-gray-100 font-black rounded-xl text-sm">Batal</button><button
                        type="submit" id="btn-submit-profil"
                        class="flex-1 py-3.5 bg-emerald-600 text-white font-black rounded-xl text-sm">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let globalBase64Foto = ""; let globalMimeType = "";

        async function pwaInit() {
            if (!currentUser) return;
            document.getElementById('profil-hp').innerText = currentUser.loginID;
            await loadPwaTasks();
        }

        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.pwa-tab-content').forEach(el => { el.classList.remove('block'); el.classList.add('hidden'); });
            document.querySelectorAll('.pwa-nav-btn').forEach(btn => { btn.classList.remove('text-emerald-600'); btn.classList.add('text-gray-400'); btn.querySelector('.pwa-nav-icon').classList.remove('bg-emerald-50'); });
            document.getElementById(tabId).classList.remove('hidden'); document.getElementById(tabId).classList.add('block');
            btnElement.classList.remove('text-gray-400'); btnElement.classList.add('text-emerald-600'); btnElement.querySelector('.pwa-nav-icon').classList.add('bg-emerald-50');
        }

        async function loadPwaTasks() {
            const listEl = document.getElementById('pwa-task-list');
            listEl.innerHTML = `<div class="text-center p-6"><i class="fa-solid fa-circle-notch fa-spin text-3xl text-emerald-500"></i></div>`;
            const res = await callAPI('getPetaniDashboard');
            if (!res.success) { listEl.innerHTML = `<p class="text-red-500 font-bold text-center text-sm">${res.message}</p>`; return; }

            document.getElementById('pwa-nama-pekerja').innerText = res.data.nama;
            document.getElementById('pwa-nama-farm').innerText = res.data.farmName;
            document.getElementById('profil-nama').innerText = res.data.nama;
            document.getElementById('pwa-saldo-angka').innerText = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(res.data.saldo || 0);

            if (res.data.tasks.length === 0) { listEl.innerHTML = `<div class="bg-white rounded-2xl p-8 border border-gray-100 text-center"><i class="fa-solid fa-mug-hot text-4xl text-emerald-300 mb-2"></i><h3 class="font-black text-sm text-gray-500">Tugas Kosong</h3></div>`; return; }

            let html = '';
            res.data.tasks.forEach(t => {
                let isMulai = t.status === 'Menunggu Dikerjakan' || t.status === 'Sedang Dikerjakan';
                let btnClass = isMulai ? 'bg-blue-50 text-blue-600 border border-blue-100' : 'bg-emerald-600 text-white shadow-sm';
                let btnText = isMulai ? 'KERJAKAN SEKARANG' : 'SELESAI & FOTO';
                let clickAction = isMulai ? `mulaiKerja('${t.id}')` : `bukaModalKamera('${t.id}')`;

                html += `<div class="bg-white rounded-xl shadow-sm border border-gray-100 mb-4 overflow-hidden"><div class="p-4 border-b border-gray-50"><div class="flex justify-between items-center mb-2"><span class="text-[10px] font-black text-gray-400"><i class="fa-regular fa-calendar"></i> ${t.tgl}</span><span class="bg-amber-50 text-amber-600 px-2 py-0.5 rounded text-[9px] font-black">${t.status}</span></div><h4 class="font-black text-lg text-gray-800 mb-1">${t.jenis}</h4><p class="font-bold text-xs text-emerald-600 mb-2.5 flex items-center gap-1"><i class="fa-solid fa-location-dot"></i> ${t.lahan}</p><p class="bg-gray-50 p-3 rounded-lg text-xs font-medium text-gray-600 border border-gray-100">${t.target}</p></div><div class="p-3 bg-gray-50"><button onclick="${clickAction}" class="w-full ${btnClass} py-3 rounded-lg font-black text-xs active:scale-95 transition-transform">${btnText}</button></div></div>`;
            }); listEl.innerHTML = html;
        }

        function mulaiKerja(id) { SMEPI_Alert("Berhasil", "Waktu mulai dicatat sistem.", "info"); loadPwaTasks(); }

        async function submitAbsen() {
            const btn = document.getElementById('btn-absen'); btn.disabled = true; btn.innerHTML = `MEMPROSES...`;
            const res = await callAPI('submitAbsen');
            if (res.success) { btn.innerHTML = `SUDAH ABSEN`; btn.className = "w-full bg-emerald-100 text-emerald-600 rounded-2xl py-6 border border-emerald-200 cursor-not-allowed font-black text-xl"; SMEPI_Alert("Sukses", res.message, "success"); }
            else { btn.innerHTML = `SAYA HADIR`; btn.disabled = false; SMEPI_Alert("Gagal", res.message, "error"); }
        }

        function bukaModalKamera(id) { document.getElementById('kamera-id-task').value = id; document.getElementById('foto-preview').classList.add('hidden'); document.getElementById('teks-preview').classList.remove('hidden'); document.getElementById('btn-kirim-foto').disabled = true; document.getElementById('btn-kirim-foto').className = "bg-gray-200 text-gray-400 py-3.5 rounded-xl font-black text-sm cursor-not-allowed"; document.getElementById('modal-kamera').classList.remove('hidden'); document.getElementById('modal-kamera').classList.add('flex'); }
        function tutupModalKamera() { document.getElementById('modal-kamera').classList.add('hidden'); document.getElementById('modal-kamera').classList.remove('flex'); }

        function previewFoto(event) {
            const file = event.target.files[0]; if (!file) return; const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = function (e) {
                const img = new Image(); img.src = e.target.result;
                img.onload = function () {
                    const canvas = document.createElement('canvas'); const MAX_WIDTH = 800; let scaleSize = Math.min(MAX_WIDTH / img.width, 1);
                    canvas.width = img.width * scaleSize; canvas.height = img.height * scaleSize; canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    globalBase64Foto = canvas.toDataURL('image/jpeg', 0.8); globalMimeType = 'image/jpeg';
                    document.getElementById('foto-preview').src = globalBase64Foto; document.getElementById('foto-preview').classList.remove('hidden'); document.getElementById('teks-preview').classList.add('hidden');
                    document.getElementById('btn-kirim-foto').disabled = false; document.getElementById('btn-kirim-foto').className = "bg-emerald-600 text-white py-3.5 rounded-xl font-black text-sm shadow-sm";
                }
            }
        }

        async function kirimLaporanSelesai() { const btn = document.getElementById('btn-kirim-foto'); btn.disabled = true; btn.innerHTML = "MENGIRIM..."; const res = await callAPI('completeTask', { taskId: document.getElementById('kamera-id-task').value, fotoBase64: globalBase64Foto, mimeType: globalMimeType }); tutupModalKamera(); SMEPI_Alert("Info", res.message, res.success ? "success" : "error"); loadPwaTasks(); }
        function bukaModalEditProfil() { document.getElementById('edit-nama').value = document.getElementById('profil-nama').innerText; document.getElementById('modal-edit-profil').classList.remove('hidden'); document.getElementById('modal-edit-profil').classList.add('flex'); }
        function tutupModalEditProfil() { document.getElementById('modal-edit-profil').classList.add('hidden'); document.getElementById('modal-edit-profil').classList.remove('flex'); }
        async function submitEditProfil(e) { e.preventDefault(); const pin = document.getElementById('edit-pin').value; if (pin.length !== 6) return SMEPI_Alert("Gagal", "PIN wajib 6 angka", "error"); const res = await callAPI('updateProfile', { newData: { nama: document.getElementById('edit-nama').value, pin: pin } }); tutupModalEditProfil(); SMEPI_Alert("Info", res.message, "info"); loadPwaTasks(); }

        pwaInit();
    </script>
</body>

</html>
