<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMEPI - Mandor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="app.js"></script>
    <link rel="manifest" href="manifest.json">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('Service Worker gagal', err));
            });
        }
    </script>
</head>
<body class="bg-gray-900">
    <script>
        const currentUser = checkAuth('mandor');
    </script>

<div class="max-w-md mx-auto bg-gray-50 h-[100dvh] relative font-sans shadow-2xl flex flex-col overflow-hidden">
    
    <header class="bg-indigo-600 px-5 pt-6 pb-4 flex-none z-20 shadow-md flex items-center justify-between rounded-b-2xl">
        <div class="flex items-center gap-3">
            <div class="w-11 h-11 rounded-full bg-white/20 border border-white/30 text-white flex items-center justify-center text-lg backdrop-blur-sm shadow-inner">
                <i class="fa-solid fa-user-tie"></i>
            </div>
            <div>
                <p class="text-[10px] font-bold text-indigo-200 uppercase tracking-wider mb-0.5" id="pwa-nama-farm-mandor">Memuat...</p>
                <h2 id="pwa-nama-mandor" class="text-lg font-black text-white leading-tight">Mandor Lapangan</h2>
            </div>
        </div>
        <button class="w-9 h-9 rounded-full bg-indigo-500/50 text-white flex items-center justify-center text-sm active:scale-90 transition-transform">
            <i class="fa-solid fa-bell"></i>
        </button>
    </header>

    <div class="flex-1 overflow-y-auto px-5 pt-5 pb-6" id="pwa-content-area-mandor">
        
        <div id="tab-home-mandor" class="pwa-tab-content-mandor block">
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-indigo-50 mb-5 flex justify-between items-center relative overflow-hidden">
                <div class="absolute -right-4 -top-4 w-16 h-16 bg-indigo-50 rounded-full opacity-50"></div>
                <div>
                    <h4 class="text-[11px] font-bold text-gray-500 uppercase tracking-wider mb-0.5">Butuh Verifikasi</h4>
                    <p class="text-2xl font-black text-indigo-600" id="count-pending">0 <span class="text-xs font-bold text-gray-400">Tugas</span></p>
                </div>
                <button onclick="loadPwaMandor()" class="w-10 h-10 bg-indigo-100 text-indigo-600 rounded-xl flex items-center justify-center shadow-inner active:scale-90 transition-transform">
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
            </div>
            <h3 class="font-black text-gray-800 text-lg mb-3 flex items-center gap-2"><i class="fa-solid fa-list-check text-indigo-600"></i> Antrean Lapangan</h3>
            <div id="pwa-verifikasi-list" class="space-y-3"></div>
        </div>

        <div id="tab-buat-tugas" class="pwa-tab-content-mandor hidden">
            <h3 class="font-black text-gray-800 text-xl mb-1">Tugas Baru</h3>
            <p class="text-gray-500 text-xs font-medium mb-5">Berikan instruksi ke petani.</p>
            <form id="form-buat-tugas" onsubmit="submitTugasBaru(event)" class="space-y-4 bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <div class="space-y-1">
                    <label class="text-[11px] font-bold text-gray-500 uppercase tracking-wider">Pilih Lahan</label>
                    <select id="input-m-lahan" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-bold text-gray-800"></select>
                </div>
                <div class="space-y-1">
                    <label class="text-[11px] font-bold text-gray-500 uppercase tracking-wider">Pilih Petani</label>
                    <select id="input-m-pekerja" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-bold text-gray-800"></select>
                </div>
                <div class="space-y-1">
                    <label class="text-[11px] font-bold text-gray-500 uppercase tracking-wider">Jenis Pekerjaan</label>
                    <select id="input-m-jenis" required class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-bold text-gray-800">
                        <option value="Persiapan Lahan / Bajak">Persiapan Lahan / Bajak</option>
                        <option value="Penanaman / Tandur">Penanaman / Tandur</option>
                        <option value="Pemupukan / Pengobatan">Pemupukan / Pengobatan</option>
                        <option value="Penyiangan Rumput">Penyiangan Rumput</option>
                        <option value="Pemanenan">Pemanenan</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-[11px] font-bold text-gray-500 uppercase tracking-wider">Target Khusus</label>
                    <textarea id="input-m-target" required rows="2" class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm font-medium text-gray-800"></textarea>
                </div>
                <button type="submit" id="btn-submit-tugas" class="w-full py-3 bg-indigo-600 text-white font-black rounded-xl shadow-lg active:scale-95 transition-transform mt-2 text-sm">KIRIM TUGAS</button>
            </form>
        </div>

        <div id="tab-riwayat" class="pwa-tab-content-mandor hidden">
            <h3 class="font-black text-gray-800 text-xl mb-3">Riwayat Tugas</h3>
            <input type="text" id="search-riwayat" onkeyup="filterRiwayat()" placeholder="Cari Lahan, Nama..." class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-xl shadow-sm text-sm focus:ring-2 focus:ring-indigo-500 outline-none font-medium mb-4">
            <div id="pwa-riwayat-list" class="space-y-3"></div>
        </div>

        <div id="tab-gudang" class="pwa-tab-content-mandor hidden">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-black text-gray-800 text-xl"><i class="fa-solid fa-boxes-stacked text-indigo-600 mr-2"></i>Gudang</h3>
                <button onclick="bukaModalRequest()" class="text-[11px] font-bold text-white bg-indigo-600 px-3 py-1.5 rounded-lg shadow-sm active:scale-95">Minta Barang</button>
            </div>
            <div id="pwa-gudang-content"></div>
        </div>

        <div id="tab-profil" class="pwa-tab-content-mandor hidden">
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 text-center mt-2 relative">
                <button onclick="bukaModalEditProfil()" class="absolute top-4 right-4 text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-lg text-xs font-bold"><i class="fa-solid fa-pen"></i> Edit</button>
                <div class="w-24 h-24 bg-indigo-50 text-indigo-400 rounded-full flex items-center justify-center mx-auto mb-4 text-5xl"><i class="fa-solid fa-user-tie"></i></div>
                <h3 id="profil-nama-mandor" class="font-black text-2xl text-gray-800 mb-1">Nama</h3>
                <p id="profil-hp-mandor" class="text-sm text-gray-500 font-bold mb-8">08xxx</p>
                <button onclick="logoutApp()" class="w-full bg-red-50 text-red-600 py-4 rounded-xl font-black text-sm border border-red-100 active:scale-95 transition-transform"><i class="fa-solid fa-power-off"></i> KELUAR APLIKASI</button>
            </div>
        </div>

    </div>

    <nav class="bg-white border-t border-gray-100 flex justify-around items-center flex-none pb-5 pt-3 px-1 shadow-[0_-4px_20px_rgba(0,0,0,0.04)] z-50 rounded-t-2xl">
        <button onclick="switchTabMandor('tab-home-mandor', this)" class="m-nav-btn text-indigo-600 flex flex-col items-center w-16 active:scale-90 transition-transform"><div class="m-nav-icon bg-indigo-50 w-10 h-8 flex items-center justify-center rounded-xl"><i class="fa-solid fa-house text-lg"></i></div><span class="text-[9px] font-bold mt-1">Verifikasi</span></button>
        <button onclick="switchTabMandor('tab-buat-tugas', this)" class="m-nav-btn text-gray-400 flex flex-col items-center w-16 active:scale-90 transition-transform"><div class="m-nav-icon w-10 h-8 flex items-center justify-center rounded-xl"><i class="fa-solid fa-pen-to-square text-lg"></i></div><span class="text-[9px] font-bold mt-1">Buat Tugas</span></button>
        <button onclick="switchTabMandor('tab-riwayat', this)" class="m-nav-btn text-gray-400 flex flex-col items-center w-16 active:scale-90 transition-transform"><div class="m-nav-icon w-10 h-8 flex items-center justify-center rounded-xl"><i class="fa-solid fa-clock-rotate-left text-lg"></i></div><span class="text-[9px] font-bold mt-1">Riwayat</span></button>
        <button onclick="switchTabMandor('tab-gudang', this)" class="m-nav-btn text-gray-400 flex flex-col items-center w-16 active:scale-90 transition-transform"><div class="m-nav-icon w-10 h-8 flex items-center justify-center rounded-xl"><i class="fa-solid fa-boxes-stacked text-lg"></i></div><span class="text-[9px] font-bold mt-1">Gudang</span></button>
        <button onclick="switchTabMandor('tab-profil', this)" class="m-nav-btn text-gray-400 flex flex-col items-center w-16 active:scale-90 transition-transform"><div class="m-nav-icon w-10 h-8 flex items-center justify-center rounded-xl"><i class="fa-solid fa-user-tie text-lg"></i></div><span class="text-[9px] font-bold mt-1">Profil</span></button>
    </nav>
</div>

<div id="modal-override" class="fixed inset-0 bg-gray-900/80 hidden flex-col justify-end z-[500] backdrop-blur-sm"><div class="bg-white w-full max-w-md mx-auto rounded-t-[2rem] p-5 pb-8"><input type="hidden" id="override-id-task"><h3 class="font-black text-xl mb-4 text-center">Ubah Status</h3><button onclick="simpanOverride('Menunggu Dikerjakan')" class="w-full bg-amber-50 text-amber-700 py-3.5 mb-2 rounded-xl font-bold text-sm">Menunggu Dikerjakan</button><button onclick="simpanOverride('Menunggu Verifikasi')" class="w-full bg-blue-50 text-blue-700 py-3.5 mb-2 rounded-xl font-bold text-sm">Menunggu Verifikasi (Selesai)</button><button onclick="simpanOverride('Approved')" class="w-full bg-emerald-50 text-emerald-700 py-3.5 mb-5 rounded-xl font-bold text-sm">Approved (Sah)</button><button onclick="tutupModalOverride()" class="w-full py-3 bg-gray-100 font-black rounded-xl text-sm">Batal</button></div></div>

<div id="modal-request" class="fixed inset-0 bg-gray-900/80 hidden flex-col justify-end z-[500] backdrop-blur-sm"><div class="bg-white w-full max-w-md mx-auto rounded-t-[2rem] p-5 pb-8"><h3 class="font-black text-xl mb-4 text-center">Permintaan Stok</h3><form onsubmit="submitRequestGudang(event)" class="space-y-3"><select id="req-id-barang" onchange="toggleManualBarang()" required class="w-full p-3 bg-gray-50 border rounded-xl font-bold text-sm"><option value="">-- Memuat --</option></select><div id="div-req-manual" class="hidden"><input type="text" id="req-nama-manual" placeholder="Ketik Manual..." class="w-full p-3 bg-emerald-50 border rounded-xl font-bold text-sm"></div><input type="number" id="req-qty" required placeholder="Jumlah" class="w-full p-3 bg-gray-50 border rounded-xl font-black text-center text-lg"><textarea id="req-note" required rows="2" placeholder="Catatan Tambahan" class="w-full p-3 bg-gray-50 border rounded-xl font-medium text-sm"></textarea><div class="flex gap-2 pt-2"><button type="button" onclick="tutupModalRequest()" class="flex-1 py-3.5 bg-gray-100 font-black rounded-xl text-sm">Batal</button><button type="submit" id="btn-submit-req" class="flex-1 py-3.5 bg-indigo-600 text-white font-black rounded-xl text-sm">Kirim</button></div></form></div></div>

<div id="modal-edit-profil" class="fixed inset-0 bg-gray-900/80 hidden flex-col justify-end z-[500] backdrop-blur-sm"><div class="bg-white w-full max-w-md mx-auto rounded-t-[2rem] p-5 pb-8"><h3 class="font-black text-xl mb-4 text-center">Edit Profil</h3><form onsubmit="submitEditProfil(event)" class="space-y-3"><input type="text" id="edit-nama" required class="w-full p-3 bg-gray-50 border rounded-xl font-bold text-sm">
    
    <div class="relative">
        <input type="password" id="edit-pin" required maxlength="6" placeholder="••••••" class="w-full p-3 pr-12 bg-gray-50 border rounded-xl font-black text-center tracking-[0.5em] text-xl outline-none focus:ring-2 focus:ring-indigo-500">
        <button type="button" onclick="toggleEditPassword()" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-indigo-600 focus:outline-none transition-colors p-1 active:scale-90">
            <i id="edit-eye-icon" class="fa-solid fa-eye text-lg"></i>
        </button>
    </div>

    <div class="flex gap-2 pt-2"><button type="button" onclick="tutupModalEditProfil()" class="flex-1 py-3.5 bg-gray-100 font-black rounded-xl text-sm">Batal</button><button type="submit" id="btn-submit-profil" class="flex-1 py-3.5 bg-indigo-600 text-white font-black rounded-xl text-sm">Simpan</button></div></form></div></div>

<script>
    let globalAllTasks = [];

    // FUNGSI MATA (SHOW/HIDE PIN)
    function toggleEditPassword() {
        const pinInput = document.getElementById('edit-pin');
        const eyeIcon = document.getElementById('edit-eye-icon');
        if (pinInput.type === 'password') {
            pinInput.type = 'text';
            eyeIcon.classList.remove('fa-eye');
            eyeIcon.classList.add('fa-eye-slash');
            eyeIcon.classList.add('text-indigo-600'); 
        } else {
            pinInput.type = 'password';
            eyeIcon.classList.remove('fa-eye-slash');
            eyeIcon.classList.add('fa-eye');
            eyeIcon.classList.remove('text-indigo-600');
        }
    }

    async function pwaMandorInit() {
        if(!currentUser) return;
        document.getElementById('profil-hp-mandor').innerText = currentUser.loginID;
        await loadPwaMandor();
        await loadPwaGudang();
    }

    function switchTabMandor(tabId, btnElement) {
        document.querySelectorAll('.pwa-tab-content-mandor').forEach(el => { el.classList.remove('block'); el.classList.add('hidden'); });
        document.querySelectorAll('.m-nav-btn').forEach(btn => { btn.classList.remove('text-indigo-600'); btn.classList.add('text-gray-400'); btn.querySelector('.m-nav-icon').classList.remove('bg-indigo-50'); });
        document.getElementById(tabId).classList.remove('hidden'); document.getElementById(tabId).classList.add('block');
        btnElement.classList.remove('text-gray-400'); btnElement.classList.add('text-indigo-600'); btnElement.querySelector('.m-nav-icon').classList.add('bg-indigo-50');
    }

    async function loadPwaMandor() {
        const listVerif = document.getElementById('pwa-verifikasi-list');
        listVerif.innerHTML = `<div class="text-center p-6"><i class="fa-solid fa-circle-notch fa-spin text-2xl text-indigo-500"></i></div>`;
        const res = await callAPI('getMandorDashboard');
        if(!res.success) { listVerif.innerHTML = `<p class="text-red-500 text-center font-bold text-sm">${res.message}</p>`; return; }
        document.getElementById('pwa-nama-mandor').innerText = res.data.nama;
        document.getElementById('profil-nama-mandor').innerText = res.data.nama;
        document.getElementById('pwa-nama-farm-mandor').innerText = res.data.farmName;
        document.getElementById('count-pending').innerHTML = `${res.data.pendingTasks.length} <span class="text-xs font-bold text-gray-400">Tugas</span>`;
        renderDropdowns(res.data.lahanList, res.data.pekerjaList);
        renderVerifikasi(res.data.pendingTasks, listVerif);
        globalAllTasks = res.data.allTasks;
        renderRiwayat(globalAllTasks, document.getElementById('pwa-riwayat-list'));
    }

    function renderDropdowns(lahanList, pekerjaList) {
        const selLahan = document.getElementById('input-m-lahan'); const selPekerja = document.getElementById('input-m-pekerja');
        let optL = '<option value="">-- Pilih Lahan --</option>'; lahanList.forEach(l => optL += `<option value="${l}">${l}</option>`); selLahan.innerHTML = optL;
        let optP = '<option value="">-- Pilih Pekerja --</option>'; pekerjaList.forEach(p => optP += `<option value="${p}">${p}</option>`); selPekerja.innerHTML = optP;
    }

    function renderVerifikasi(tasks, container) {
        if(tasks.length === 0) { container.innerHTML = `<div class="bg-white rounded-2xl p-6 text-center border border-gray-100"><i class="fa-solid fa-check-double text-3xl text-indigo-300 mb-2"></i><h3 class="font-black text-sm text-gray-400">Semua Bersih</h3></div>`; return; }
        let html = '';
        tasks.forEach(t => {
            let btnFoto = (t.foto && t.foto !== "-") ? `<a href="${t.foto}" target="_blank" class="mt-2 w-full flex items-center justify-center gap-1.5 bg-sky-50 text-sky-600 py-2 rounded-lg text-[10px] font-black"><i class="fa-solid fa-image"></i> LIHAT BUKTI</a>` : '';
            html += `<div class="bg-white rounded-xl shadow-sm mb-3 border border-gray-100 overflow-hidden"><div class="p-3 border-b border-gray-50"><div class="flex justify-between mb-1.5"><span class="text-gray-400 text-[9px] font-black"><i class="fa-regular fa-calendar"></i> ${t.tgl}</span><span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded text-[9px] font-black">${t.pekerja}</span></div><h4 class="font-black text-sm text-gray-800 leading-tight mb-1">${t.jenis}</h4><p class="text-[10px] font-bold text-indigo-500 flex items-center gap-1"><i class="fa-solid fa-location-dot"></i> ${t.lahan}</p><p class="text-[10px] mt-1 bg-gray-50 p-2 rounded border border-gray-100 text-gray-600">${t.target}</p>${btnFoto}</div><div class="p-2 bg-gray-50 flex gap-1.5"><button onclick="verifikasiTugas('${t.id}', 'reject')" class="flex-1 bg-white border border-red-200 text-red-600 py-2 rounded-lg font-black text-[10px]">TOLAK</button><button onclick="verifikasiTugas('${t.id}', 'approve')" class="flex-1 bg-emerald-500 text-white py-2 rounded-lg font-black text-[10px] shadow-sm">SETUJUI</button></div></div>`;
        }); container.innerHTML = html;
    }

    function renderRiwayat(tasks, container) {
        if(tasks.length === 0) { container.innerHTML = `<p class="text-center text-gray-400 font-bold text-sm">Belum ada riwayat.</p>`; return; }
        let html = '';
        tasks.forEach(t => {
            let bColor = t.status.includes('Approved') ? 'text-emerald-600 bg-emerald-50' : t.status.includes('Ditolak') ? 'text-red-600 bg-red-50' : 'text-gray-600 bg-gray-100';
            html += `<div class="bg-white rounded-xl p-3.5 shadow-sm border border-gray-100 search-item mb-3"><div class="flex justify-between items-start mb-1.5"><span class="text-[9px] font-black text-gray-400">${t.tgl}</span><span class="px-1.5 py-0.5 rounded text-[8px] font-black ${bColor}">${t.status}</span></div><h4 class="font-black text-sm text-gray-800 mb-0.5">${t.jenis}</h4><p class="text-[10px] font-bold text-indigo-400 mb-2">${t.pekerja} • ${t.lahan}</p><button onclick="bukaModalOverride('${t.id}')" class="w-full py-1.5 bg-gray-50 border border-gray-100 text-indigo-600 rounded-lg text-[10px] font-black">Ubah Status</button></div>`;
        }); container.innerHTML = html;
    }

    function filterRiwayat() { let filter = document.getElementById('search-riwayat').value.toLowerCase(); document.querySelectorAll('.search-item').forEach(el => { el.style.display = el.innerText.toLowerCase().indexOf(filter) > -1 ? "" : "none"; }); }

    async function verifikasiTugas(id, action) {
        let isYes = await SMEPI_Confirm("Konfirmasi", "Lanjutkan proses verifikasi?", "Ya", "info");
        if(isYes) { const res = await callAPI('verifyTask', { taskId: id, taskAction: action }); SMEPI_Alert(res.success ? "Berhasil" : "Gagal", res.message, res.success ? "success" : "error"); loadPwaMandor(); }
    }

    async function submitTugasBaru(e) {
        e.preventDefault(); const btn = document.getElementById('btn-submit-tugas'); btn.innerHTML = `MEMPROSES...`; btn.disabled = true;
        const payload = { lahan: document.getElementById('input-m-lahan').value, pekerja: document.getElementById('input-m-pekerja').value, jenis: document.getElementById('input-m-jenis').value, instruksi: document.getElementById('input-m-target').value };
        const res = await callAPI('createTask', { taskData: payload }); btn.innerHTML = `KIRIM TUGAS`; btn.disabled = false;
        if(res.success) { SMEPI_Alert("Sukses", res.message, "success"); document.getElementById('form-buat-tugas').reset(); loadPwaMandor(); } else SMEPI_Alert("Gagal", res.message, "error");
    }

    function bukaModalOverride(id) { document.getElementById('override-id-task').value = id; document.getElementById('modal-override').classList.remove('hidden'); document.getElementById('modal-override').classList.add('flex'); }
    function tutupModalOverride() { document.getElementById('modal-override').classList.add('hidden'); document.getElementById('modal-override').classList.remove('flex'); }
    async function simpanOverride(status) { tutupModalOverride(); const res = await callAPI('overrideTaskStatus', { taskId: document.getElementById('override-id-task').value, newStatus: status }); SMEPI_Alert(res.success ? "Sukses" : "Gagal", res.message, res.success ? "success" : "error"); loadPwaMandor(); }

    async function loadPwaGudang() {
        const container = document.getElementById('pwa-gudang-content'); const res = await callAPI('getGudangData'); if(!res.success) return;
        let optHtml = '<option value="">-- Pilih Barang --</option>'; res.data.allItems.forEach(b => { optHtml += `<option value="${b.id}|${b.nama}">${b.nama} (Sisa: ${b.qty})</option>`; }); optHtml += '<option value="MANUAL">➕ Ketik Manual</option>'; document.getElementById('req-id-barang').innerHTML = optHtml;
        let html = ''; res.data.lowStok.forEach(b => { html += `<div class="bg-red-50 p-3 rounded-xl mb-2 flex justify-between items-center font-bold border border-red-100"><p class="text-xs text-red-800">${b.nama}</p><p class="text-red-600 text-sm">${b.qty}</p></div>`; }); res.data.allItems.forEach(b => { html += `<div class="bg-white shadow-sm border border-gray-100 p-3 rounded-xl mb-2 flex justify-between items-center font-bold"><p class="text-xs text-gray-700">${b.nama}</p><p class="text-emerald-600 text-sm">${b.qty}</p></div>`; }); container.innerHTML = html;
    }

    function toggleManualBarang() { document.getElementById('div-req-manual').className = document.getElementById('req-id-barang').value === 'MANUAL' ? "space-y-1 block" : "hidden"; }
    function bukaModalRequest() { document.getElementById('modal-request').classList.remove('hidden'); document.getElementById('modal-request').classList.add('flex'); }
    function tutupModalRequest() { document.getElementById('modal-request').classList.add('hidden'); document.getElementById('modal-request').classList.remove('flex'); }
    
    async function submitRequestGudang(e) {
        e.preventDefault(); const btn = document.getElementById('btn-submit-req'); btn.disabled = true;
        const idVal = document.getElementById('req-id-barang').value; const idBarang = idVal === 'MANUAL' ? 'MANUAL' : idVal.split('|')[0]; const namaBarang = idVal === 'MANUAL' ? document.getElementById('req-nama-manual').value : idVal.split('|')[1];
        const res = await callAPI('requestItem', { idBarang: idBarang, namaBarang: namaBarang, qty: document.getElementById('req-qty').value, note: document.getElementById('req-note').value });
        tutupModalRequest(); btn.disabled = false; SMEPI_Alert("Info", res.message, res.success ? "success" : "error");
    }

    function bukaModalEditProfil() { document.getElementById('modal-edit-profil').classList.remove('hidden'); document.getElementById('modal-edit-profil').classList.add('flex'); }
    function tutupModalEditProfil() { document.getElementById('modal-edit-profil').classList.add('hidden'); document.getElementById('modal-edit-profil').classList.remove('flex'); }
    async function submitEditProfil(e) {
        e.preventDefault(); const pin = document.getElementById('edit-pin').value; if(pin.length !== 6) return SMEPI_Alert("Gagal", "PIN wajib 6 angka", "error");
        const res = await callAPI('updateProfile', { newData: { nama: document.getElementById('edit-nama').value, pin: pin } }); tutupModalEditProfil(); SMEPI_Alert("Info", res.message, "info"); loadPwaMandor();
    }

    pwaMandorInit();
</script>
</body>
